<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Universo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Global Header -->
    <div id="app-header"></div>

    <main class="container">
        <!-- THE MEGA HOME BENTO GRID -->
        <div class="bento-grid">

            <!-- L1: Hero Banner (Span 12) -->
            <div class="bento-item mega-hero" id="home-hero">
                <!-- Dynamically injected via main.js -->
            </div>

            <!-- L2: Quote Engine (Span 12) -->
            <div class="quote-engine-block" id="home-quote">
                <!-- Dynamically injected via main.js -->
            </div>

            <!-- L3: Categories / Secondary Characters (Span 12) -->
            <div class="bento-item categories-block" id="home-categories">
                <!-- Dynamically injected via main.js -->
            </div>

            <!-- L4: Latest Release (Span 6) -->
            <div class="bento-item mega-release minimal-panel" id="home-latest">
                <!-- Dynamically injected via main.js -->
            </div>

            <!-- L4: Creator Status (Span 6) -->
            <div class="bento-item creator-status-card minimal-panel" id="home-status">
                <!-- Dynamically injected via main.js -->
            </div>

            <!-- L5: Gallery Mosaic (Span 12) -->
            <div class="bento-item gallery-mosaic" id="home-gallery">
                <!-- Dynamically injected via main.js -->
            </div>

        </div>

        <!-- THE PANTHEON (Hub de Personagens) -->
        <h2 id="panteao" class="section-title">O Panteão</h2>
        <div id="characters-grid" class="characters-grid">
            <!-- Dynamically injected via main.js -->
        </div>

    </main>

    <!-- Global Footer -->
    <div id="app-footer"></div>

    <!-- Scripts -->
    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
