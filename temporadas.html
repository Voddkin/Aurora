<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Temporadas - Projeto Universo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Global Header -->
    <div id="app-header"></div>

        <h1 class="section-title" style="margin-top: 2rem; border-bottom: none; margin-bottom: 1rem;">Temporadas Disponíveis</h1>

        <!-- Grid de Temporadas (Injected via JS) -->

        </div>

    <script src="js/database.js"></script>
