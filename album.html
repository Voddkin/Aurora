<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGLM-O: Álbum Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="album-page-body">
    <div id="app-header"></div>

    <main class="container">
        <!-- Dashboard Admin Header -->
        <section class="admin-dashboard-mode glass-panel reveal" style="margin-top: 2rem;">
            <a href="galeria.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar para Galeria</a>

            <div class="dashboard-header-flex">
                <div class="dashboard-titles">
                    <h1 id="album-title">Carregando Álbum...</h1>
                    <p id="album-desc"></p>
                    <div id="album-tags-container" class="tags-pill-container"></div>
                </div>
                
                <div class="dashboard-controls">
                    <div class="toolbar-group">
                        <label>Ordenar Fotos</label>
                        <select id="sort-photos" class="toolbar-select">
                            <option value="date-desc">Mais Recentes</option>
                            <option value="date-asc">Mais Antigas</option>
                            <option value="name-asc">Nome A-Z</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Editor de tags oculto por padrão -->
            <div id="album-tags-editor" class="dashboard-tags-editor">
                <input type="text" id="album-tags-input" class="premium-input" placeholder="Ex: lore, oficial, spoiler">
                <button id="btn-save-tags" class="btn btn-premium-ghost"><i class="fa-solid fa-floppy-disk"></i> Salvar Tags</button>
            </div>
        </section>

        <!-- Photos Grid -->
        <section id="photos-container" class="photos-grid-premium">
            <!-- Dynamically populated by JS -->
        </section>
    </main>

    <!-- Premium Lightbox Modal -->
    <div id="photo-modal" class="photo-modal-premium" role="dialog" aria-modal="true">
        <div class="modal-blur-backdrop"></div>

        <button class="modal-close" id="modal-close" aria-label="Fechar"><i class="fa-solid fa-xmark"></i></button>
        <button class="modal-nav prev" id="modal-prev" aria-label="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="modal-nav next" id="modal-next" aria-label="Próximo"><i class="fa-solid fa-chevron-right"></i></button>

        <div class="modal-split">
            <div class="modal-img-container">
                <img id="modal-img" class="modal-img" src="" alt="View">
            </div>
            <div class="modal-sidebar glass-panel">
                <h2 id="modal-title">Photo Name</h2>
                <div class="modal-meta">
                    <span id="modal-filesize"></span> • <span id="modal-date"></span>
                </div>

                <div id="modal-desc" class="modal-description-area">
                    <!-- Description injected here via parseLoreText -->
                </div>

                <button id="modal-set-cover" class="btn btn-premium-ghost w-100"><i class="fa-solid fa-star"></i> Definir como Capa</button>

                <div class="modal-controls-zoom">
                    <button id="modal-zoom-out" class="btn btn-outline" aria-label="Zoom Out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                    <button id="modal-zoom-in" class="btn btn-outline" aria-label="Zoom In"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                </div>
            </div>
        </div>
    </div>

    <button id="btn-edit-mode" class="fab-edit" title="Modo de Edição Dashboard"><i class="fa-solid fa-pen-nib"></i></button>

    <div id="app-footer"></div>

    <script src="js/database.js"></script>
    <script src="js/gallery-data.js"></script>
    <script src="vendor/Sortable.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
