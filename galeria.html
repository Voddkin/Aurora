<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGLM-O: Galeria Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-header"></div>

    <main class="container gallery-main-container">
        <section class="gallery-header-premium">
            <div class="gallery-header-content reveal">
                <h1>SGLM-O Acervo Visual</h1>
                <p>Gerenciamento de mídias offline em alta definição. Selecione um ciclo para inspecionar.</p>
            </div>
        </section>

        <!-- Admin / Filter Toolbar -->
        <div class="gallery-toolbar-premium glass-panel reveal">
            <div class="toolbar-group">
                <label>Raridade</label>
                <select id="filter-rarity" class="toolbar-select">
                    <option value="all">Todas as Raridades</option>
                    <option value="common">Comum</option>
                    <option value="rare">Raro</option>
                    <option value="epic">Épico</option>
                    <option value="legendary">Lendário</option>
                    <option value="aurora">Aurora (Única)</option>
                </select>
            </div>

            <div class="toolbar-group">
                <label>Filtro por Tag</label>
                <select id="filter-tag" class="toolbar-select">
                    <option value="all">Todas as Tags</option>
                </select>
            </div>

            <div class="toolbar-group">
                <label>Ordenação</label>
                <select id="sort-albums" class="toolbar-select">
                    <option value="date-desc">Mais Recentes</option>
                    <option value="date-asc">Mais Antigos</option>
                    <option value="name-asc">Ordem Alfabética (A-Z)</option>
                    <option value="name-desc">Ordem Alfabética (Z-A)</option>
                </select>
            </div>
        </div>

        <!-- The Vitrine -->
        <section id="albums-container" class="gallery-grid-premium">
            <!-- Dynamically populated by JS -->
            <div class="skeleton-album shimmer"></div>
            <div class="skeleton-album shimmer"></div>
            <div class="skeleton-album shimmer"></div>
        </section>
    </main>

    <div id="app-footer"></div>

    <script src="js/database.js"></script>
    <script src="js/gallery-data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
